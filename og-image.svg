<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef2ec"/>
      <stop offset="100%" style="stop-color:#f0f2ee"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="24" fill="none" stroke="#c8d8c4" stroke-width="2"/>
  <rect x="30" y="30" width="1140" height="570" rx="20" fill="none" stroke="#4a6741" stroke-width="3"/>
  <!-- Left accent bar -->
  <rect x="80" y="180" width="6" height="120" rx="3" fill="#4a6741"/>
  <!-- Main headline -->
  <text x="116" y="245" font-family="Georgia, serif" font-style="italic" font-size="72" font-weight="300" fill="#1c1f1a">Is your banknote worth</text>
  <text x="116" y="330" font-family="Georgia, serif" font-style="italic" font-size="72" font-weight="700" fill="#1c1f1a">more than face value?</text>
  <!-- Sub text -->
  <text x="116" y="390" font-family="Arial, sans-serif" font-size="28" fill="#8a8d87">Free fancy serial number checker — USD, GBP, AUD and EUR</text>
  <!-- Logo -->
  <text x="116" y="520" font-family="Georgia, serif" font-style="italic" font-size="42" font-weight="600" fill="#1c1f1a">fancyserial</text>
  <text x="116" y="520" font-family="Georgia, serif" font-style="italic" font-size="42" font-weight="600" fill="#1c1f1a" dx="237">.money</text>
  <!-- .money in sage -->
  <text x="353" y="520" font-family="Georgia, serif" font-style="italic" font-size="42" font-weight="600" fill="#4a6741">.money</text>
  <!-- Right side pattern examples -->
  <rect x="820" y="160" width="300" height="60" rx="12" fill="white" stroke="#dde0da" stroke-width="1.5"/>
  <text x="970" y="198" font-family="Courier, monospace" font-size="32" font-weight="700" fill="#1c1f1a" text-anchor="middle">12344321</text>
  <rect x="890" y="175" width="80" height="22" rx="11" fill="#4a6741"/>
  <text x="930" y="191" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">RADAR</text>

  <rect x="820" y="240" width="300" height="60" rx="12" fill="white" stroke="#dde0da" stroke-width="1.5"/>
  <text x="970" y="278" font-family="Courier, monospace" font-size="32" font-weight="700" fill="#1c1f1a" text-anchor="middle">88888888</text>
  <rect x="890" y="255" width="80" height="22" rx="11" fill="#4a6741"/>
  <text x="930" y="271" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">SOLID</text>

  <rect x="820" y="320" width="300" height="60" rx="12" fill="white" stroke="#dde0da" stroke-width="1.5"/>
  <text x="970" y="358" font-family="Courier, monospace" font-size="32" font-weight="700" fill="#1c1f1a" text-anchor="middle">12345678</text>
  <rect x="880" y="335" width="90" height="22" rx="11" fill="#4a6741"/>
  <text x="925" y="351" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">LADDER</text>

  <rect x="820" y="400" width="300" height="60" rx="12" fill="white" stroke="#dde0da" stroke-width="1.5"/>
  <text x="970" y="438" font-family="Courier, monospace" font-size="32" font-weight="700" fill="#1c1f1a" text-anchor="middle">12341234</text>
  <rect x="876" y="415" width="100" height="22" rx="11" fill="#4a6741"/>
  <text x="926" y="431" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">REPEATER</text>
  <!-- Free badge -->
  <rect x="116" y="544" width="120" height="36" rx="18" fill="#4a6741"/>
  <text x="176" y="567" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">FREE CHECKER</text>
</svg>